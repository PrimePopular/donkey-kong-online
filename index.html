<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Donkey Kong Online</title>
    <style>
        body { background-color: black; color: white; text-align: center; margin: 0; overflow: hidden; }
        canvas { border: 2px solid #c82828; }
    </style>
</head>
<body>
    <h1>Donkey Kong Online</h1>
    <div id="status">Loading Python Environment...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script src="https://pygame-web.github.io/archives/0.8/pygbag.js"></script>
    <script>
        window.onload = function() {
            // This initializes the pygbag loader
            window.mountAndRun(document.getElementById('canvas'), "main.py");
        };
    </script>
</body>
</html>
